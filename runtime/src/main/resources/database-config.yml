# Game-node configuration for messaging and remote authority access.

# Redis configuration (used for message bus and caching)
redis:
  enabled: true
  host: localhost
  port: 6379
  password: ""
  database: 0
  connection-pool:
    min-idle: 1
    max-idle: 8
    max-total: 8

# Game nodes submit authority commands to the registry-hosted authority by default.
authority:
  mode: "remote"
  server-id: "registry-service"
  command-transport: "kafka"
  request-timeout-ms: 5000
  snapshot-cache-max-age-ms: 1000
  snapshot-cache:
    store: "valkey"
    required: true
  kafka:
    bootstrap-servers: "localhost:9092"
    client-id: "fulcrum-paper-authority-client"
    validate-topology: true
    create-missing-topics: false
  hot-state:
    cassandra:
      contact-points: "localhost:9042"
      local-datacenter: "datacenter1"
      keyspace: "fulcrum_authority"
      validate-schema: true
