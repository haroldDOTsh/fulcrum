# Game nodes submit authority commands to the registry-hosted authority by default.
authority:
  mode: "remote"
  server-id: "registry-service"
  command-transport: "kafka"
  request-timeout-ms: 5000
  snapshot-cache-max-age-ms: 1000
  snapshot-cache:
    store: "valkey"
    required: true
  kafka:
    bootstrap-servers: "localhost:9092"
    client-id: "fulcrum-velocity-authority-client"
    validate-topology: true
    create-missing-topics: false
  hot-state:
    cassandra:
      contact-points: "localhost:9042"
      local-datacenter: "datacenter1"
      keyspace: "fulcrum_authority"
      validate-schema: true

# Redis configuration for Message Bus
redis:
  # Enable/disable Redis. When disabled, uses in-memory message bus
  enabled: true
  # Redis server host
  host: localhost
  # Redis server port
  port: 6379
  # Database index to use
  database: 0
  # Redis password (optional)
  password: ""
  # Connection timeout in milliseconds
  connection-timeout: 2000
  # Connection pool configuration
  connection-pool:
    min-idle: 1
    max-idle: 8
    max-total: 8
