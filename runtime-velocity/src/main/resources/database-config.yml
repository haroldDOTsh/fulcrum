# PostgreSQL is the only durable Fulcrum authority store.
postgres:
  jdbc-url: "jdbc:postgresql://localhost:5432/fulcrum"
  database: "fulcrum"
  username: "fulcrum_user"
  password: ""
  connection-pool:
    maximum-pool-size: 4
    minimum-idle: 1
    connection-timeout: 5000
    idle-timeout: 300000
    max-lifetime: 1800000

# Redis configuration for Message Bus
redis:
  # Enable/disable Redis. When disabled, uses in-memory message bus
  enabled: true
  # Redis server host
  host: localhost
  # Redis server port
  port: 6379
  # Database index to use
  database: 0
  # Redis password (optional)
  password: ""
  # Connection timeout in milliseconds
  connection-timeout: 2000
  # Connection pool configuration
  connection-pool:
    min-idle: 1
    max-idle: 8
    max-total: 8
