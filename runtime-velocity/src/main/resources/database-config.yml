# Game nodes submit authority commands to the registry-hosted authority by default.
authority:
  mode: "remote"
  server-id: "registry-service"
  request-timeout-ms: 5000
  snapshot-cache-max-age-ms: 1000

# Redis configuration for Message Bus
redis:
  # Enable/disable Redis. When disabled, uses in-memory message bus
  enabled: true
  # Redis server host
  host: localhost
  # Redis server port
  port: 6379
  # Database index to use
  database: 0
  # Redis password (optional)
  password: ""
  # Connection timeout in milliseconds
  connection-timeout: 2000
  # Connection pool configuration
  connection-pool:
    min-idle: 1
    max-idle: 8
    max-total: 8
