name: Publish Fulcrum

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ "${tag}" = "${version}" ]; then
            echo "Release tags must start with v, got ${tag}" >&2
            exit 1
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag ${tag} must be SemVer-compatible without build metadata" >&2
            exit 1
          fi
          gradle_version="$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' build.gradle.kts | head -n 1)"
          if [ -z "${gradle_version}" ]; then
            echo "Could not read root Gradle version from build.gradle.kts" >&2
            exit 1
          fi
          if [ "${version}" != "${gradle_version}" ]; then
            echo "Tag version ${version} does not match Gradle version ${gradle_version}" >&2
            exit 1
          fi
          echo "FULCRUM_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${tag}" >> "${GITHUB_ENV}"

      - name: Generate release notes
        run: |
          set -euo pipefail
          previous_tag="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${RELEASE_TAG}"
          else
            range="${RELEASE_TAG}"
          fi
          {
            echo "## Changes"
            git log --no-merges --pretty=format:'- %s (%h)' "${range}"
            echo
            echo
            echo "## Published artifacts"
            echo "- GitHub Packages SDK/BOM coordinates for ${FULCRUM_VERSION}"
            echo "- GHCR images tagged ${FULCRUM_VERSION}"
            echo "- Fulcrum operator ZIP"
            echo "- Fulcrum release manifest"
          } > release-notes.md

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Prepare Gradle wrapper
        run: chmod +x gradlew

      - name: Log in to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Run release rehearsal
        run: ./gradlew releaseRehearsal

      - name: Publish SDK and signed images
        run: ./gradlew publishFulcrumDistribution

      - name: Verify published GHCR images
        run: |
          set -euo pipefail
          images=(
            "ghcr.io/harolddotsh/fulcrum-service-launcher:${FULCRUM_VERSION}"
            "ghcr.io/harolddotsh/fulcrum-paper-gameserver:${FULCRUM_VERSION}"
            "ghcr.io/harolddotsh/fulcrum-velocity-proxy:${FULCRUM_VERSION}"
          )
          for image in "${images[@]}"; do
            docker pull "${image}"
            cosign verify \
              --certificate-identity-regexp "https://github.com/haroldDOTsh/fulcrum/.github/workflows/publish.yml@.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${image}"
          done

      - name: Verify SDK resolves externally
        run: |
          set -euo pipefail
          consumer="${RUNNER_TEMP}/fulcrum-sdk-consumer"
          mkdir -p "${consumer}"
          cat > "${consumer}/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  mavenCentral()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  mavenCentral()
                  maven {
                      url = uri("https://maven.pkg.github.com/harolddotsh/fulcrum")
                      credentials {
                          username = System.getenv("GITHUB_ACTOR")
                          password = System.getenv("GITHUB_TOKEN")
                      }
                  }
              }
          }

          rootProject.name = "fulcrum-sdk-consumer"
          EOF
          cat > "${consumer}/build.gradle.kts" <<EOF
          plugins {
              java
          }

          dependencies {
              implementation(platform("sh.harold.fulcrum:fulcrum-sdk-bom:${FULCRUM_VERSION}"))
              implementation("sh.harold.fulcrum:authoring-sdk")
          }

          tasks.register("resolveFulcrumSdk") {
              doLast {
                  configurations.compileClasspath.get().resolve().forEach {
                      println(it.name)
                  }
              }
          }
          EOF
          ./gradlew --no-daemon -p "${consumer}" resolveFulcrumSdk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          operator_zip="distribution/service-launcher/build/operator/fulcrum-operator-${FULCRUM_VERSION}.zip"
          release_manifest="build/publication/release-manifest/fulcrum-${FULCRUM_VERSION}.json"
          test -f "${operator_zip}"
          test -f "${release_manifest}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Fulcrum ${FULCRUM_VERSION}" \
              --notes-file release-notes.md
            gh release upload "${RELEASE_TAG}" \
              "${operator_zip}" \
              "${release_manifest}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "Fulcrum ${FULCRUM_VERSION}" \
              --notes-file release-notes.md \
              "${operator_zip}" \
              "${release_manifest}"
          fi
