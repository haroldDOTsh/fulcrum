apiVersion: v1
kind: Service
metadata:
  name: {{ include "fulcrum.name" . }}-kafka
  labels:
    {{- include "fulcrum.labels" . | nindent 4 }}
    sh.harold.fulcrum/service: kafka-command-log
spec:
  clusterIP: None
  selector:
    sh.harold.fulcrum/service: kafka-command-log
  ports:
    - name: broker
      port: 9092
      targetPort: broker
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fulcrum.name" . }}-kafka
  labels:
    {{- include "fulcrum.labels" . | nindent 4 }}
    sh.harold.fulcrum/service: kafka-command-log
spec:
  serviceName: {{ include "fulcrum.name" . }}-kafka
  replicas: {{ .Values.stores.kafka.replicas }}
  selector:
    matchLabels:
      sh.harold.fulcrum/service: kafka-command-log
  template:
    metadata:
      labels:
        sh.harold.fulcrum/service: kafka-command-log
    spec:
      containers:
        - name: kafka
          image: {{ .Values.images.kafka | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: broker
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://{{ include "fulcrum.name" . }}-kafka:9092
---
