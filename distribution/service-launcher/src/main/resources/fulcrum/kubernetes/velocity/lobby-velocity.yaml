apiVersion: v1
kind: ServiceAccount
metadata:
  name: fulcrum-velocity-agent
  namespace: fulcrum-lobby
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fulcrum-velocity-agent
  namespace: fulcrum-lobby
data:
  FULCRUM_VELOCITY_SERVER_ROOT: "/opt/fulcrum/velocity"
  FULCRUM_VELOCITY_KAFKA_BOOTSTRAP_SERVERS: "fulcrum-kafka:9092"
  FULCRUM_VELOCITY_ROUTE_BRIDGE_URL: "http://127.0.0.1:18081/routes"
  FULCRUM_VELOCITY_LOGIN_GATE_BRIDGE_URL: "http://127.0.0.1:18082/login-gate"
  FULCRUM_VELOCITY_ROUTE_COMMAND_TOPIC: "host.velocity.routes"
  FULCRUM_ROUTE_COMMAND_TOPIC: "cmd.route"
  FULCRUM_QUEUE_ROSTER_COMMAND_TOPIC: "ctrl.cmd.queue-roster"
  FULCRUM_PRESENCE_COMMAND_TOPIC: "cmd.presence"
  FULCRUM_SHARED_SHARD_PLACEMENT_COMMAND_TOPIC: "ctrl.cmd.shared-shard-placement"
  FULCRUM_ROUTE_ATTEMPT_COMMAND_TOPIC: "ctrl.cmd.route-attempt"
  FULCRUM_LIFECYCLE_TRACE_COMMAND_TOPIC: "ctrl.cmd.lifecycle-trace"
  FULCRUM_SHARED_SHARD_ALLOCATION_STATE_TOPIC: "ctrl.state.shared-shard-allocation"
  FULCRUM_LOBBY_EXPERIENCE_ID: "experience-lobby"
  FULCRUM_LOBBY_POOL_ID: "pool-lobby"
  FULCRUM_LOBBY_AGONES_FLEET_NAME: "fulcrum-lobby-paper"
  FULCRUM_LOBBY_TARGET_CAPACITY: "75"
  FULCRUM_LOBBY_HARD_CAPACITY: "150"
  FULCRUM_LOBBY_RESOLVED_MANIFEST_ID: "manifest-lobby-bedrock-v1"
  FULCRUM_LOBBY_CAPABILITY_SCOPE_FINGERPRINT: "capability-scope-lobby"
  FULCRUM_LOGIN_GATE_SCOPE: "experience-lobby"
  FULCRUM_VELOCITY_PRESENCE_LEASE: "PT5M"
  FULCRUM_VALKEY_ENDPOINT: "fulcrum-valkey:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulcrum-velocity
  namespace: fulcrum-lobby
  labels:
    sh.harold.fulcrum/role: "velocity-agent"
spec:
  replicas: 1
  selector:
    matchLabels:
      sh.harold.fulcrum/role: "velocity-agent"
  template:
    metadata:
      labels:
        sh.harold.fulcrum/role: "velocity-agent"
    spec:
      serviceAccountName: fulcrum-velocity-agent
      containers:
        - name: velocity-proxy
          image: ghcr.io/harolddotsh/fulcrum-velocity-proxy:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            - name: probe
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fulcrum-velocity-agent
          env:
            - name: FULCRUM_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FULCRUM_MACHINE_REF
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: FULCRUM_POOL_ID
              value: "pool-velocity"
            - name: FULCRUM_PRINCIPAL_ID
              value: "principal-fulcrum-velocity-agent"
            - name: FULCRUM_CREDENTIAL_REF
              value: "service-account:fulcrum-velocity-agent"
          livenessProbe:
            httpGet:
              path: /live
              port: probe
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: probe
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fulcrum-velocity-l4
  namespace: fulcrum-lobby
  labels:
    sh.harold.fulcrum/role: "velocity-agent"
spec:
  type: LoadBalancer
  selector:
    sh.harold.fulcrum/role: "velocity-agent"
  ports:
    - name: minecraft
      port: 25565
      targetPort: minecraft
      protocol: TCP
