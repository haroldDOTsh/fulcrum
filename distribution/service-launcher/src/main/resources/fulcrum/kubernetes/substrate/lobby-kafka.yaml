              memory: "512Mi"
            limits:
              memory: "1024Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulcrum-worker-agent
  namespace: fulcrum-lobby
  labels:
    sh.harold.fulcrum/role: "worker-agent"
spec:
  replicas: 1
