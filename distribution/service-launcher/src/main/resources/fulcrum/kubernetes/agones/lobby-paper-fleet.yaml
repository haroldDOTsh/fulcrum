apiVersion: v1
kind: Namespace
metadata:
  name: fulcrum-lobby
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fulcrum-content-provisioner
  namespace: fulcrum-lobby
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fulcrum-paper-agent
  namespace: fulcrum-lobby
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fulcrum-paper-agones-sdk
  namespace: fulcrum-lobby
rules:
  - apiGroups: ["agones.dev"]
    resources: ["gameservers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fulcrum-paper-agones-sdk
  namespace: fulcrum-lobby
subjects:
  - kind: ServiceAccount
    name: fulcrum-paper-agent
    namespace: fulcrum-lobby
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fulcrum-paper-agones-sdk
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fulcrum-lobby-paper-assignment
  namespace: fulcrum-lobby
data:
  FULCRUM_OBJECT_STORE_MODE: "s3"
  FULCRUM_OBJECT_STORE_ENDPOINT: "http://fulcrum-object-store:9000"
  FULCRUM_OBJECT_STORE_REGION: "us-east-1"
  FULCRUM_PAPER_SERVER_ROOT: "/var/fulcrum/paper"
  FULCRUM_PAPER_ALLOCATION_FILE: "/var/fulcrum/paper/fulcrum-allocated-assignment.properties"
  FULCRUM_PAPER_KAFKA_BOOTSTRAP_SERVERS: "fulcrum-kafka:9092"
  FULCRUM_PAPER_AGONES_SDK_URL: "http://127.0.0.1:9358/"
  FULCRUM_PAPER_OBSERVATION_BRIDGE_URL: "http://127.0.0.1:18080/observations"
  FULCRUM_PAPER_CAPABILITY_BRIDGE_URL: "http://127.0.0.1:18083/capabilities"
  FULCRUM_PAPER_REWARD_BRIDGE_URL: "http://127.0.0.1:18084/rewards"
  FULCRUM_VALKEY_ENDPOINT: "fulcrum-valkey:6379"
  FULCRUM_PAPER_EXPERIENCE_ID: "experience-lobby"
  FULCRUM_PAPER_SESSION_ID: "session-lobby-shared"
  FULCRUM_PAPER_SLOT_ID: "slot-lobby-shared"
  FULCRUM_PAPER_RESOLVED_MANIFEST_ID: "manifest-lobby-bedrock-v1"
  FULCRUM_PAPER_CODE_ARTIFACT_ID: "artifact-paper-gameserver"
  FULCRUM_PAPER_WORLD_ARTIFACT_ID: "artifact-lobby-bedrock-world"
  FULCRUM_PAPER_WORLD_ARTIFACT_DIGEST: "105d948db09cb4eb6a8ac74d1ae01744366a5252e2a2b033d480c5154bde2abe"
  FULCRUM_PAPER_WORLD_ARTIFACT_COMPATIBILITY: "lobby-world-v1"
  FULCRUM_PAPER_SESSION_LEASE: "PT5M"
  FULCRUM_PAPER_HOST_RUNTIME_ABI: "paper-host-runtime-v1"
  FULCRUM_PAPER_ROUTE_ID_PREFIX: "route-velocity-login-"
  FULCRUM_PAPER_SPAWN_WORLD: "world"
  FULCRUM_PAPER_SPAWN_X: "0.5"
  FULCRUM_PAPER_SPAWN_Y: "65.0"
  FULCRUM_PAPER_SPAWN_Z: "0.5"
  FULCRUM_PAPER_SPAWN_YAW: "0.0"
  FULCRUM_PAPER_SPAWN_PITCH: "0.0"
  FULCRUM_HOST_COMMAND_TOPIC: "host.paper.commands"
  FULCRUM_HOST_OBSERVATION_TOPIC: "host.observation"
  FULCRUM_PAPER_REWARD_DELIVERY_COPIES: "2"
---
apiVersion: v1
kind: Secret
metadata:
  name: fulcrum-lobby-paper-owner
  namespace: fulcrum-lobby
type: Opaque
stringData:
  FULCRUM_PAPER_SESSION_OWNER_TOKEN: "replace-with-runtime-issued-owner-token"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fulcrum-lobby-world-artifact
  namespace: fulcrum-lobby
  labels:
    sh.harold.fulcrum/provisioner: "lobby-world-artifact"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        sh.harold.fulcrum/role: "content-provisioner"
    spec:
      serviceAccountName: fulcrum-content-provisioner
      restartPolicy: OnFailure
      containers:
        - name: lobby-world-artifact-provisioner
          image: ghcr.io/sh-harold/fulcrum-service-launcher:dev
          imagePullPolicy: IfNotPresent
          command:
            - "java"
          args:
            - "-cp"
            - "/opt/fulcrum/fulcrum/lib/*"
            - "sh.harold.fulcrum.distribution.launcher.LobbyWorldArtifactProvisioner"
          env:
            - name: FULCRUM_OBJECT_STORE_MODE
              value: "s3"
            - name: FULCRUM_OBJECT_STORE_ENDPOINT
              value: "http://fulcrum-object-store:9000"
            - name: FULCRUM_OBJECT_STORE_REGION
              value: "us-east-1"
            - name: FULCRUM_OBJECT_STORE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fulcrum-object-store-credentials
                  key: FULCRUM_OBJECT_STORE_ACCESS_KEY
            - name: FULCRUM_OBJECT_STORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fulcrum-object-store-credentials
                  key: FULCRUM_OBJECT_STORE_SECRET_KEY
            - name: FULCRUM_KAFKA_BOOTSTRAP_SERVERS
              value: "fulcrum-kafka:9092"
            - name: FULCRUM_ARTIFACT_METADATA_COMMAND_TOPIC
              value: "cmd.artifact-metadata"
            - name: FULCRUM_LOBBY_WORLD_OBJECT_BUCKET
              value: "artifact-store"
            - name: FULCRUM_LOBBY_WORLD_ARTIFACT_ID
              value: "artifact-lobby-bedrock-world"
            - name: FULCRUM_LOBBY_WORLD_ARTIFACT_COMPATIBILITY
              value: "lobby-world-v1"
            - name: FULCRUM_LOBBY_WORLD_PROVENANCE
              value: "fulcrum:lobby-bedrock-world:v1"
            - name: FULCRUM_PRINCIPAL_ID
              value: "principal-lobby-world-provisioner"
            - name: FULCRUM_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
---
apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: fulcrum-lobby-paper
  namespace: fulcrum-lobby
  labels:
    sh.harold.fulcrum/pool-id: "pool-lobby"
    sh.harold.fulcrum/experience-id: "experience-lobby"
spec:
  replicas: 1
  scheduling: Packed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        sh.harold.fulcrum/pool-id: "pool-lobby"
        sh.harold.fulcrum/experience-id: "experience-lobby"
      annotations:
        sh.harold.fulcrum/slot-id: "slot-lobby-shared"
        sh.harold.fulcrum/instance-kind: "paper"
        sh.harold.fulcrum/principal-id: "principal-fulcrum-paper-agent"
    spec:
      ports:
        - name: minecraft
          portPolicy: Dynamic
          containerPort: 25565
          protocol: TCP
      health:
        disabled: false
        initialDelaySeconds: 30
        periodSeconds: 5
        failureThreshold: 3
      sdkServer:
        logLevel: Info
        grpcPort: 9357
        httpPort: 9358
      counters:
        presences:
          count: 0
          capacity: 100
      template:
        metadata:
          labels:
            sh.harold.fulcrum/role: "paper-agent"
        spec:
          serviceAccountName: fulcrum-paper-agent
          containers:
            - name: paper-gameserver
              image: ghcr.io/sh-harold/fulcrum-paper-gameserver:dev
              imagePullPolicy: IfNotPresent
              args:
                - "--profile=single-machine"
                - "--role=paper-agent"
                - "--mode=run"
                - "--probe-host=0.0.0.0"
                - "--probe-port=18081"
              ports:
                - name: minecraft
                  containerPort: 25565
                  protocol: TCP
                - name: probe
                  containerPort: 18081
                  protocol: TCP
              envFrom:
                - configMapRef:
                    name: fulcrum-lobby-paper-assignment
                - secretRef:
                    name: fulcrum-lobby-paper-owner
                - secretRef:
                    name: fulcrum-object-store-credentials
              env:
                - name: FULCRUM_INSTANCE_ID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: FULCRUM_MACHINE_REF
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: FULCRUM_POOL_ID
                  value: "pool-lobby"
                - name: FULCRUM_PRINCIPAL_ID
                  value: "principal-fulcrum-paper-agent"
                - name: FULCRUM_CREDENTIAL_REF
                  value: "service-account:fulcrum-paper-agent"
                - name: MINECRAFT_EULA
                  value: "true"
                - name: FULCRUM_TEST_OPERATOR_NAME
                  value: "ZECHEESELORD"
                - name: FULCRUM_TEST_OPERATOR_UUID
                  value: "fe85a251-2c9b-3c79-a2eb-2e725d7df55f"
                - name: FULCRUM_TEST_OPERATOR_LEVEL
                  value: "4"
                - name: FULCRUM_TEST_OPERATOR_BYPASSES_PLAYER_LIMIT
                  value: "true"
              livenessProbe:
                httpGet:
                  path: /live
                  port: probe
                initialDelaySeconds: 10
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /ready
                  port: probe
                initialDelaySeconds: 10
                periodSeconds: 5
              volumeMounts:
                - name: paper-state
                  mountPath: /var/fulcrum/paper
          volumes:
            - name: paper-state
              emptyDir: {}
---
apiVersion: autoscaling.agones.dev/v1
kind: FleetAutoscaler
metadata:
  name: fulcrum-lobby-paper-buffer
  namespace: fulcrum-lobby
spec:
  fleetName: fulcrum-lobby-paper
  policy:
    type: Buffer
    buffer:
      bufferSize: 1
      minReplicas: 1
      maxReplicas: 4
  sync:
    type: FixedInterval
    fixedInterval:
      seconds: 30
