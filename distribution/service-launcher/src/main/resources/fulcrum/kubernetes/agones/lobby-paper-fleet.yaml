apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: fulcrum-lobby-paper
  namespace: fulcrum-lobby
  labels:
    sh.harold.fulcrum/pool-id: "pool-lobby"
    sh.harold.fulcrum/experience-id: "experience-lobby"
spec:
  replicas: 1
  scheduling: Packed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        sh.harold.fulcrum/pool-id: "pool-lobby"
        sh.harold.fulcrum/experience-id: "experience-lobby"
      annotations:
        sh.harold.fulcrum/slot-id: "slot-lobby-shared"
        sh.harold.fulcrum/instance-kind: "paper"
        sh.harold.fulcrum/principal-id: "principal-fulcrum-paper-agent"
    spec:
      ports:
        - name: minecraft
          portPolicy: Dynamic
          containerPort: 25565
          protocol: TCP
      health:
        disabled: false
        initialDelaySeconds: 30
        periodSeconds: 5
        failureThreshold: 3
      sdkServer:
        logLevel: Info
        grpcPort: 9357
        httpPort: 9358
      counters:
        presences:
          count: 0
          capacity: 100
      template:
        metadata:
          labels:
            sh.harold.fulcrum/role: "paper-agent"
        spec:
          serviceAccountName: fulcrum-paper-agent
          containers:
            - name: paper-gameserver
              image: ghcr.io/sh-harold/fulcrum-paper-gameserver:dev
              imagePullPolicy: IfNotPresent
              args:
                - "--profile=single-machine"
                - "--role=paper-agent"
                - "--mode=run"
                - "--probe-host=0.0.0.0"
                - "--probe-port=8080"
              ports:
                - name: minecraft
                  containerPort: 25565
                  protocol: TCP
                - name: probe
                  containerPort: 8080
                  protocol: TCP
              envFrom:
                - configMapRef:
                    name: fulcrum-lobby-paper-assignment
                - secretRef:
                    name: fulcrum-lobby-paper-owner
              env:
                - name: FULCRUM_INSTANCE_ID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: FULCRUM_MACHINE_REF
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: FULCRUM_POOL_ID
                  value: "pool-lobby"
                - name: FULCRUM_PRINCIPAL_ID
                  value: "principal-fulcrum-paper-agent"
                - name: FULCRUM_CREDENTIAL_REF
                  value: "service-account:fulcrum-paper-agent"
              livenessProbe:
                httpGet:
                  path: /live
                  port: probe
                initialDelaySeconds: 10
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /ready
                  port: probe
                initialDelaySeconds: 10
                periodSeconds: 5
              volumeMounts:
                - name: paper-state
                  mountPath: /var/fulcrum/paper
                - name: object-store
                  mountPath: /var/fulcrum/object-store
                  readOnly: true
          volumes:
            - name: paper-state
              emptyDir: {}
            - name: object-store
              persistentVolumeClaim:
                claimName: fulcrum-object-store
                readOnly: true
---
apiVersion: autoscaling.agones.dev/v1
kind: FleetAutoscaler
metadata:
  name: fulcrum-lobby-paper-buffer
  namespace: fulcrum-lobby
spec:
  fleetName: fulcrum-lobby-paper
  policy:
    type: Buffer
    buffer:
      bufferSize: 1
      minReplicas: 1
      maxReplicas: 4
  sync:
    type: FixedInterval
    fixedInterval:
      seconds: 30
